<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | K23-XXXX</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body style="font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, #74b9ff, #a29bfe); height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center;">

    <main style="background: white; width: 100%; max-width: 400px; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.15);">
        <header style="text-align: center; margin-bottom: 30px;">
            <h1 style="color: #2d3436; margin: 0; font-size: 2em;">Welcome Back</h1>
            <p style="color: #636e72; margin-top: 5px;">Please sign in to your account</p>
        </header>

        <form action="home.html" method="GET" style="display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label for="username" style="display: block; font-weight: 600; color: #2d3436; margin-bottom: 8px;">Username</label>
                <input type="text" id="username" name="username" required minlength="4" placeholder="Enter your username" 
                       style="width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 1em; outline: none; transition: border-color 0.2s;">
            </div>

            <div>
                <label for="password" style="display: block; font-weight: 600; color: #2d3436; margin-bottom: 8px;">Password</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="••••••••" 
                       style="width: 100%; padding: 12px; border: 2px solid #dfe6e9; border-radius: 8px; box-sizing: border-box; font-size: 1em; outline: none;">
            </div>

            <button type="submit" style="background: #6c5ce7; color: white; border: none; padding: 14px; font-size: 11em; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.2s; margin-top: 10px; font-size: 16px;">
                Sign In
            </button>
        </form>

        <footer style="text-align: center; margin-top: 25px; color: #636e72; font-size: 0.95em;">
            Don't have an account? <a href="register.html" style="color: #6c5ce7; text-decoration: none; font-weight: bold;">Register here</a>
        </footer>
    </main>

</body>
</html>
